name: Deploy to VPS

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  APP_DIR: /opt/knex-flow-backend
  IMAGE_NAME: knex-flow-app
  HEALTHCHECK_URL: http://localhost:3000/health
  SSH_TARGET: ${{ secrets.SERVER_ROOT_USER }}@${{ secrets.SERVER_IPV4 }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare deployment bundle
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p deploy
          cp docker-compose.yml deploy/
          printf '%s\n' "$ENV_FILE" > deploy/.env
          docker save "${IMAGE_NAME}:latest" | gzip -1 > deploy/app-image.tar.gz

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_IPV4: ${{ secrets.SERVER_IPV4 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IPV4" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh "${SSH_TARGET}" "sudo mkdir -p '${APP_DIR}'"

      - name: Copy bundle to VPS
        run: |
          rsync -az --delete --rsync-path="sudo rsync" deploy/ "${SSH_TARGET}:${APP_DIR}/"

      - name: Deploy with Docker Compose
        run: |
          ssh "${SSH_TARGET}" "
            set -e
            cd '${APP_DIR}'
            if sudo docker image inspect '${IMAGE_NAME}:latest' >/dev/null 2>&1; then
              sudo docker tag '${IMAGE_NAME}:latest' '${IMAGE_NAME}:previous'
            fi
            gunzip -c app-image.tar.gz | sudo docker load
            rm -f app-image.tar.gz
            sudo docker compose up -d --remove-orphans --no-build
          "

      - name: Health check
        run: |
          ssh "${SSH_TARGET}" "for i in {1..15}; do if curl -fsS '${HEALTHCHECK_URL}' > /dev/null; then exit 0; fi; sleep 5; done; exit 1"

      - name: Rollback on failed health check
        if: ${{ failure() }}
        run: |
          ssh "${SSH_TARGET}" "
            set -e
            if sudo docker image inspect '${IMAGE_NAME}:previous' >/dev/null 2>&1; then
              sudo docker tag '${IMAGE_NAME}:previous' '${IMAGE_NAME}:latest'
              cd '${APP_DIR}' && sudo docker compose up -d --no-deps --no-build app
            else
              echo 'Rollback skipped: no previous image found'
              exit 1
            fi
          "

      - name: Prune unused images
        if: ${{ success() }}
        run: |
          ssh "${SSH_TARGET}" "sudo docker image prune -f"
