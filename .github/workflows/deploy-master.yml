name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "deploy" para confirmar o deploy em produção'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_DIR: /opt/knex-flow-backend
  BACKUP_DIR: /opt/knex-flow-backend_backup_latest
  HEALTHCHECK_URL: http://localhost:3000/health
  SSH_TARGET: ${{ secrets.SERVER_ROOT_USER }}@${{ secrets.SERVER_IPV4 }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Verify authorized user
        env:
          ALLOWED_USER: art-83
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" != "$ALLOWED_USER" ]; then
            echo "::error::Deploy nao autorizado. Apenas '$ALLOWED_USER' pode executar deploy. Usuario atual: $ACTOR"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deployment bundle
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          mkdir -p deploy/dist
          cp Dockerfile deploy/
          cp docker-compose.yml deploy/
          cp package.json package-lock.json deploy/
          cp -r dist/. deploy/dist/
          printf '%s\n' "$ENV_FILE" > deploy/.env

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_IPV4: ${{ secrets.SERVER_IPV4 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IPV4" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh "${SSH_TARGET}" "sudo mkdir -p '${APP_DIR}'"

      - name: Create remote backup (rollback point)
        run: |
          ssh "${SSH_TARGET}" "if [ -d '${APP_DIR}' ]; then sudo rm -rf '${BACKUP_DIR}' && sudo cp -a '${APP_DIR}' '${BACKUP_DIR}'; fi"

      - name: Copy bundle to VPS
        run: |
          rsync -az --delete --rsync-path="sudo rsync" deploy/ "${SSH_TARGET}:${APP_DIR}/"

      - name: Deploy with Docker Compose
        run: |
          ssh "${SSH_TARGET}" "cd '${APP_DIR}' && sudo docker compose up -d --build --remove-orphans"

      - name: Health check
        run: |
          ssh "${SSH_TARGET}" "for i in {1..15}; do if curl -fsS '${HEALTHCHECK_URL}' > /dev/null; then exit 0; fi; sleep 5; done; exit 1"

      - name: Rollback on failed health check
        if: ${{ failure() }}
        run: |
          ssh "${SSH_TARGET}" "if [ -d '${BACKUP_DIR}' ]; then sudo rm -rf '${APP_DIR}' && sudo mv '${BACKUP_DIR}' '${APP_DIR}' && cd '${APP_DIR}' && sudo docker compose up -d --build --remove-orphans; else echo 'Rollback skipped: no backup found' && exit 1; fi"

      - name: Remove backup after successful deploy
        if: ${{ success() }}
        run: |
          ssh "${SSH_TARGET}" "sudo rm -rf '${BACKUP_DIR}'"
