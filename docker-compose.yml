services:
  redis:
    image: redis:7-alpine
    container_name: knex-flow-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  db:
    image: postgres:15-alpine
    container_name: knex-flow-database
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: knex-flow-minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: knex-flow-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knex-flow-app
    restart: always
    stop_grace_period: 60s
    stop_signal: SIGTERM
    env_file:
      - .env
    environment:
      DB_SYNCHRONIZE: 'true'
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ['node', 'dist/shared/infra/http/server.js']

volumes:
  db-data:
  redis-data:
  minio-data:
