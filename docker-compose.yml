version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eventflow-db
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventflow-app
    restart: always
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db

volumes:
  db-data:
