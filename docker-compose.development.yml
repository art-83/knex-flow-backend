services:
  redis:
    image: redis:7-alpine
    container_name: eventflow-redis
    env_file:
      - .env.development
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:15-alpine
    container_name: eventflow-database
    env_file:
      - .env.development
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventflow-app
    env_file:
      - .env.development
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', 'dist/shared/infra/http/server.js']
    restart: unless-stopped

  workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventflow-worker
    env_file:
      - .env.development
    command: ['node', 'dist/shared/infra/queue/queue-bootstrap.js']
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
